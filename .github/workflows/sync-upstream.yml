name: Sync upstream

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/IvanSolis1989/Smart-Config-Kit.git
          git fetch upstream main

      - name: Sync main with upstream/main
        run: |
          if git merge --no-edit upstream/main; then
            git push origin HEAD:main
          else
            echo "Upstream sync for main has conflicts. Resolve them manually, then rerun this workflow."
            exit 1
          fi

      - name: Sync custom DNS branch with upstream/main
        run: |
          git fetch origin fix/verge-style-dns
          git switch -C fix/verge-style-dns origin/fix/verge-style-dns
          if git merge --no-edit upstream/main; then
            git push origin HEAD:fix/verge-style-dns
          else
            echo "Upstream sync for fix/verge-style-dns has conflicts. Resolve them manually, then rerun this workflow."
            exit 1
          fi
